<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Truco Vzla - Pro</title>
  <style>
    /* Configuración visual general */
    body {
      background-color: #000; /* Fondo negro para ahorro de batería */
      color: #fff;
      font-family: -apple-system, system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 20px 0;
      box-sizing: border-box;
    }
    /* Contenedor de las columnas de puntuación */
    .tablero {
      display: flex;
      width: 100%;
      justify-content: space-around;
      margin-top: 20px;
    }
    .col {
      text-align: center;
      width: 50%;
    }
    .nombre {
      font-size: 0.8rem;
      color: #444;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    /* Estilo de los números de puntuación */
    .puntos {
      font-size: 6.5rem;
      font-weight: 200;
      margin: 10px 0;
      line-height: 1;
    }
    .controles {
      display: flex;
      justify-content: center;
      gap: 15px;
    }
    /* Estilo de los botones circulares */
    button {
      background: #111;
      border: 1px solid #333;
      color: #fff;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 1.5rem;
      touch-action: manipulation; /* Optimiza la respuesta al toque */
      cursor: pointer;
    }
    button:active {
      background: #333;
      transform: scale(0.9);
    }
    /* Contenedor del historial de jugadas */
    .log-container {
      width: 85%;
      margin-top: 30px;
      border-top: 1px solid #222;
      padding-top: 15px;
      flex-grow: 1;
      overflow-y: auto;
      text-align: center;
    }
    .log-titulo {
      font-size: 0.7rem;
      color: #444;
      margin-bottom: 10px;
      text-transform: uppercase;
    }
    .log-entrada {
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 5px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    /* Botón de reinicio */
    .btn-reset {
      background: none;
      border: none;
      color: #333;
      font-size: 0.7rem;
      margin-top: 15px;
      text-decoration: underline;
      white-space: nowrap; /* Evita que el texto salte de línea */
      align-self: center;  /* Centra el botón en el flex column del body */
      width: auto;         /* Anula el width: 60px del selector general button */
    }
    /* Botón Escala */
    .btn-escala {
      background: none;
      border: 1px solid #2a2a2a;
      color: #555;
      font-size: 0.65rem;
      margin-top: 8px;
      margin-bottom: 12px;
      padding: 6px 20px;
      border-radius: 20px;
      align-self: center;
      width: auto;
      height: auto;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-escala:hover {
      border-color: #555;
      color: #888;
    }
    .btn-escala:active {
      background: #1a1a1a;
      transform: scale(0.95);
    }
    /* Modal de la escala */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.93);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.activo {
      display: flex;
    }
    .modal-img {
      max-width: 95vw;
      max-height: 88vh;
      border-radius: 8px;
      box-shadow: 0 0 50px rgba(255, 255, 255, 0.08);
      animation: zoomIn 0.25s ease;
    }
    @keyframes zoomIn {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }
    .modal-cerrar {
      position: fixed;
      top: 16px; right: 20px;
      font-size: 1.6rem;
      color: #666;
      cursor: pointer;
      background: none;
      border: none;
      width: auto;
      height: auto;
      border-radius: 0;
      padding: 4px 8px;
      line-height: 1;
      transition: color 0.2s;
    }
    .modal-cerrar:hover { color: #ccc; }
    .modal-cerrar:active { transform: scale(0.9); }
  </style>
</head>
<body>
  <div class="tablero">
    <div class="col">
      <span class="nombre">NOSOTROS</span>
      <p id="puntos-nos" class="puntos">0</p>
      <div class="controles">
        <button onclick="sumar('nos', -1)">-</button>
        <button onclick="sumar('nos', 1)">+</button>
      </div>
    </div>
    <div class="col">
      <span class="nombre">ELLOS</span>
      <p id="puntos-ell" class="puntos">0</p>
      <div class="controles">
        <button onclick="sumar('ell', -1)">-</button>
        <button onclick="sumar('ell', 1)">+</button>
      </div>
    </div>
  </div>
  <div class="log-container">
    <div class="log-titulo">Historial de jugadas</div>
    <div id="lista-log"></div>
  </div>
  <button class="btn-reset" onclick="resetear()">Reiniciar Partida</button>
  <button class="btn-escala" onclick="mostrarEscala()">Escala</button>

  <!-- Modal de la escala de cartas -->
  <div class="modal-overlay" id="modal-escala" onclick="cerrarEscala(event)">
    <button class="modal-cerrar" onclick="cerrarEscala()">✕</button>
    <img src="escala.png" alt="Escala de cartas del Truco Venezolano" class="modal-img">
  </div>

  <script>
    // Cargamos los puntos guardados de la sesión anterior o iniciamos en 0
    let n = parseInt(localStorage.getItem('nos')) || 0;
    let e = parseInt(localStorage.getItem('ell')) || 0;

    // Al cargar la página, inyectamos los datos guardados en la interfaz
    window.onload = () => {
      document.getElementById('puntos-nos').innerText = n;
      document.getElementById('puntos-ell').innerText = e;
      document.getElementById('lista-log').innerHTML = localStorage.getItem('log') || "";
    };

    // Función principal para modificar la puntuación
    function sumar(equipo, valor) {
      let textoLog = "";
      let signo = valor > 0 ? "+" : "";
      if(equipo === 'nos') {
        n = Math.max(0, n + valor); // Evita que los puntos sean negativos
        document.getElementById('puntos-nos').innerText = n;
        textoLog = `NOSOTROS: ${signo}${valor} (Total: ${n})`;
        check(n, "¡NOSOTROS GANAMOS!");
      } else {
        e = Math.max(0, e + valor);
        document.getElementById('puntos-ell').innerText = e;
        textoLog = `ELLOS: ${signo}${valor} (Total: ${e})`;
        check(e, "¡ELLOS GANAN!");
      }
      agregarLog(textoLog);
      guardar(); // Guardamos el estado actual tras cada cambio
    }

    // Añade una nueva línea al historial visual (la más reciente arriba)
    function agregarLog(mensaje) {
      const lista = document.getElementById('lista-log');
      const div = document.createElement('div');
      div.className = 'log-entrada';
      div.innerText = mensaje;
      lista.prepend(div);
    }

    // Guarda las variables y el HTML del historial en la memoria local
    function guardar() {
      localStorage.setItem('nos', n);
      localStorage.setItem('ell', e);
      localStorage.setItem('log', document.getElementById('lista-log').innerHTML);
    }

    // Comprueba si se ha alcanzado el límite de 24 puntos
    function check(p, m) {
      if(p >= 24) {
        // Pequeño retardo para permitir que el número 24 se pinte en pantalla antes del aviso
        setTimeout(() => {
          alert(m);
          resetear(true); // Reinicio forzado para limpiar todo automáticamente
        }, 100);
      }
    }

    /**
     * Limpia la partida.
     * @param {boolean} forzado - Si es true, no pide confirmación al usuario (útil al ganar).
     */
    function resetear(forzado = false) {
      if(forzado || confirm("¿Seguro que quieres reiniciar la partida?")) {
        n = 0;
        e = 0;
        // Borramos definitivamente los datos del almacenamiento local
        localStorage.clear();
        // Actualizamos la interfaz visual a cero
        document.getElementById('puntos-nos').innerText = 0;
        document.getElementById('puntos-ell').innerText = 0;
        document.getElementById('lista-log').innerHTML = "";
      }
    }

    // Muestra el modal con la escala de cartas
    function mostrarEscala() {
      document.getElementById('modal-escala').classList.add('activo');
    }

    // Cierra el modal al pulsar ✕ o al tocar fuera de la imagen
    function cerrarEscala(e) {
      const modal = document.getElementById('modal-escala');
      if (!e || e.target === modal || e.target.classList.contains('modal-cerrar')) {
        modal.classList.remove('activo');
      }
    }
  </script>
</body>
</html>
